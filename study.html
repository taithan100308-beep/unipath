<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý thời gian học - Study Time Manager</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="study.js" defer></script>
</head>
<body>
  <nav class="navbar">
  <div class="nav-left">
    <h2 class="nav-logo">Study Time Manager</h2>
  </div>
  <div class="nav-right">
    <a href="homepage.html">Trang chủ</a>
    <a href="universities.html">Thông tin tuyển sinh</a>
    <a href="documents.html">Công văn</a>
    <a href="contact.html">Liên hệ</a>
    <button id="logoutNavBtn" class="logout-btn">Đăng xuất</button>
  </div>
</nav>
<!-- 🌟 PHẦN MỚI TRONG study.html -->
<div class="study-container">
  <h1>⏱️ Quản lý thời gian học tập</h1>

  <!-- Tạo mục học -->
  <div class="task-create">
    <input type="text" id="taskInput" placeholder="Nhập tên môn học hoặc công việc..." />
    <button id="addTaskBtn">➕ Thêm mục học</button>
  </div>

  <!-- Danh sách các mục học -->
  <div id="taskList" class="task-list"></div>

<div class="chart-section">
    <h2>📊 Thống kê thời gian học trong tháng</h2>
    <canvas id="barChart"></canvas>

    <h2>🥧 Tỉ lệ thời gian giữa các mục học</h2>
    <canvas id="pieChart"></canvas>
  </div>
</div>

<!-- ✅ CHỈNH LẠI PHẦN SCRIPT NẰM NGOÀI CÁC <div> -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="study.js"></script>
</body>
</html>
